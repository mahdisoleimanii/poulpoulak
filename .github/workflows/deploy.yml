name: build & deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: tag
        if: github.event_name == 'push'
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/poulpoulak:latest
            ghcr.io/${{ github.repository_owner }}/poulpoulak:${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "$HOME/poulpoulak"
            # Write runtime env vars from GitHub Secrets (no .env file needed).
            cat > .env <<-ENVEOF
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            SUPER_ADMINS=${{ secrets.SUPER_ADMINS }}
            PROXY_URL=${{ secrets.PROXY_URL }}
            DATA_DIR=/data
            ENVEOF
            # Pull the freshly built image.
            GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} \
              docker compose pull api || true
            GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} \
              docker compose up -d --remove-orphans
            docker image prune -f

      - name: Smoke-check the container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd "$HOME/poulpoulak"
            docker compose ps
